<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة خطوبة | فارس & فاطمة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Great+Vibes&family=Reem+Kufi:wght@500;700&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f7f4eb; /* خلفية كريمي دافية */
            color: #3f3a32;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* الكارت الرئيسي */
        .card {
            max-width: 480px;
            width: 85%;
            margin: 30px auto;
            padding: 50px 25px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(143, 114, 71, 0.15);
            border: 1px solid #e2d9c8;
            position: relative;
            overflow: hidden; /* عشان الصورة والورد مايطلعوش برة الكارت */
        }

        /* الصورة الخلفية الـ Faded */
        .bg-photo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* استبدل wedding-photo.jpg باسم صورتكم */
            background-image: url('wedding-photo.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.08; /* درجة الشفافية عشان تبقى Faded ومتناسقة مع الخلفية */
            pointer-events: none;
            z-index: 1;
        }

        /* زينة الورد الكلاسيك على الجوانب */
        .card::before, .card::after {
            content: '✿';
            font-size: 2.5rem;
            color: #c5a880;
            position: absolute;
            opacity: 0.4;
            z-index: 2;
        }
        .card::before { top: 20px; right: 20px; border-right: 2px solid #e2d9c8; border-top: 2px solid #e2d9c8; padding: 10px; border-radius: 0 15px 0 0; }
        .card::after { bottom: 20px; left: 20px; border-left: 2px solid #e2d9c8; border-bottom: 2px solid #e2d9c8; padding: 10px; border-radius: 0 0 0 15px; }

        /* المحتوى فوق الصورة */
        .content {
            position: relative;
            z-index: 3;
        }

        h1 {
            font-family: 'Reem Kufi', sans-serif;
            color: #721c24; /* نبيتي غامق فخم */
            font-size: 1.6rem;
            letter-spacing: 2px;
            margin: 0;
        }

        /* خط الكيرسيف للأسماء */
        .cursive-names {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #b3925c;
            margin: 10px 0 0 0;
            direction: ltr;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .arabic-names {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #3f3a32;
            margin-bottom: 20px;
        }

        .invitation-text {
            font-size: 1.05rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 35px;
            padding: 0 10px;
        }

        /* مربعات التفاصيل المتناسقة */
        .grid-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-box {
            background: rgba(253, 251, 247, 0.85);
            border: 1px solid #ebdcb9;
            border-radius: 15px;
            padding: 15px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .info-box.full-width {
            grid-column: span 2;
        }

        .info-box span {
            display: block;
            font-size: 0.85rem;
            color: #a0845a;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .info-box p {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            color: #444;
        }

        /* زر اللوكيشن الشيك */
        .btn-location {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #b3925c, #967949);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(179, 146, 92, 0.4);
            transition: all 0.3s ease;
        }

        .btn-location:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(114, 28, 36, 0.4);
            background: linear-gradient(135deg, #721c24, #501217);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- الصورة الـ Faded بالخلفية -->
        <div class="bg-photo"></div>

        <!-- المحتوى الرئيسي -->
        <div class="content">
            <h1>دعوة خطوبة</h1>
            
            <div class="cursive-names">Fares & Fatma</div>
            <div class="arabic-names">فارس & فاطمة</div>
            
            <p class="invitation-text">
                بقلوب ملؤها الفرح والسرور، ندعوكم لمشاركتنا حفل خطوبتنا. <br>
                حضوركم يسعدنا ويشرفنا، وفرحتنا لا تكتمل إلا بكم.
            </p>
            
            <!-- المربعات المتناسقة الجديدة -->
            <div class="grid-details">
                <div class="info-box">
                    <span>التاريخ</span>
                    <p>الجمعة ١٦ / ١٠ / ٢٠٢٦</p>
                </div>
                
                <div class="info-box">
                    <span>الوقت</span>
                    <p>الساعة ٧:٠٠ مساءً</p>
                </div>
                
                <div class="info-box full-width">
                    <span>الموقع</span>
                    <p>الحديقة الأندلسية، مدينة نصر</p>
                </div>
            </div>
            
            <a href="https://maps.google.com" target="_blank" class="btn-location">لوكيشن المكان 📍</a>
        </div>
    </div>

</body>
</html>
